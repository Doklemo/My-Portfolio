<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Puzzle — Playground · Ayodeji Lemo</title>
  <meta name="description" content="An anime character sliding picture puzzle. Solve the scrambled tiles to reveal the character!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/cursor.css">
  <style>
    /* ── Page Shell ─────────────────────────────── */
    body { background: #0a0a0f; color: #e8e8ed; min-height: 100vh; }
    
    .puzzle-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .puzzle-nav-back {
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 500;
      text-decoration: none; letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .puzzle-nav-back:hover { color: #fff; }
    .puzzle-nav-title {
      font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .puzzle-nav-score {
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.5);
    }
    .puzzle-nav-score span { color: #a78bfa; font-weight: 700; }

    /* ── Layout ─────────────────────────────────── */
    .puzzle-page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 120px 24px 60px;
      gap: 40px;
    }

    .puzzle-header { text-align: center; }
    .puzzle-header h1 {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .puzzle-header p {
      color: rgba(255,255,255,0.4); font-size: 14px; max-width: 340px; margin: 0 auto;
    }

    /* ── Character Selector ──────────────────────── */
    .char-selector-wrap {
      display: flex; flex-direction: column; gap: 14px; align-items: center;
      max-width: 640px;
    }
    .char-series-group { width: 100%; }
    .char-series-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); margin-bottom: 8px; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .char-series-label::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
    }
    .char-selector {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .char-btn {
      width: 60px; height: 60px; border-radius: 14px; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08); cursor: pointer;
      transition: all 0.2s; background: #111;
      position: relative; flex-shrink: 0;
    }
    .char-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .char-btn:hover { border-color: rgba(167,139,250,0.5); transform: scale(1.06); }
    .char-btn.active { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.25); }
    .char-btn .char-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); font-size: 8px; font-weight: 600;
      text-align: center; padding: 2px 0; letter-spacing: 0.05em;
      text-transform: uppercase; color: #fff;
    }

    /* ── Game Area ───────────────────────────────── */
    .puzzle-game-area {
      display: flex; gap: 40px; align-items: flex-start;
      flex-wrap: wrap; justify-content: center; width: 100%; max-width: 880px;
    }

    /* ── Puzzle Board ─────────────────────────────── */
    .puzzle-board-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    .puzzle-board {
      display: grid;
      gap: 3px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 3px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      position: relative;
    }

    .puzzle-tile {
      width: 120px; height: 120px;
      border-radius: 10px;
      background-size: 360px 360px;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.22,1,0.36,1), box-shadow 0.18s;
      user-select: none;
      position: relative;
    }
    .puzzle-tile:hover:not(.empty-tile) {
      transform: scale(1.04);
      box-shadow: 0 8px 24px rgba(167,139,250,0.3);
      z-index: 2;
    }
    .puzzle-tile.empty-tile {
      background: rgba(255,255,255,0.03) !important;
      cursor: default;
      border: 1px dashed rgba(255,255,255,0.08);
    }
    .puzzle-tile.movable {
      outline: 2px solid rgba(167,139,250,0.5);
      cursor: pointer;
    }
    .puzzle-tile.sliding {
      transition: transform 0.22s cubic-bezier(0.22,1,0.36,1);
    }

    /* solved overlay */
    .puzzle-solved-overlay {
      position: absolute; inset: 0; border-radius: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(12px);
      gap: 16px; opacity: 0; pointer-events: none;
      transition: opacity 0.4s; z-index: 20;
    }
    .puzzle-solved-overlay.visible { opacity: 1; pointer-events: auto; }
    .puzzle-solved-overlay h2 {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .puzzle-solved-overlay p { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; }

    /* ── Side Panel ──────────────────────────────── */
    .puzzle-side {
      display: flex; flex-direction: column; gap: 20px; min-width: 200px;
    }

    .puzzle-reference {
      border-radius: 16px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      position: relative;
    }
    .puzzle-reference img { width: 200px; height: 200px; object-fit: cover; display: block; }
    .puzzle-reference-label {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.7); text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px;
    }

    .puzzle-stats {
      display: flex; flex-direction: column; gap: 10px;
    }
    .puzzle-stat {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 12px 16px;
    }
    .puzzle-stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .puzzle-stat-value { font-size: 18px; font-weight: 700; color: #a78bfa; }

    .puzzle-controls { display: flex; flex-direction: column; gap: 10px; }
    .btn-puzzle {
      width: 100%; padding: 12px 20px; border-radius: 12px; border: none;
      font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.03em; transition: all 0.2s;
    }
    .btn-puzzle--primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,0.4);
    }
    .btn-puzzle--primary:hover {
      transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.5);
    }
    .btn-puzzle--ghost {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-puzzle--ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Difficulty Selector ─────────────────────── */
    .diff-selector { display: flex; gap: 6px; }
    .diff-btn {
      flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4);
      font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    .diff-btn.active {
      background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.4);
      color: #a78bfa;
    }
    .diff-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: #fff; }

    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); margin-bottom: 2px;
    }

    /* ── Confetti ────────────────────────────────── */
    .confetti-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; width: 8px; height: 8px; border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 640px) {
      .puzzle-tile { width: 90px; height: 90px; }
      .puzzle-board { gap: 2px; padding: 2px; border-radius: 16px; }
      .puzzle-tile { border-radius: 8px; }
      .puzzle-game-area { gap: 24px; }
      .puzzle-side { min-width: unset; width: 100%; }
      .puzzle-reference img { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="puzzle-nav">
    <a href="../playground.html" class="puzzle-nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Playground
    </a>
    <span class="puzzle-nav-title">Anime Puzzle</span>
    <span class="puzzle-nav-score">Moves: <span id="nav-moves">0</span></span>
  </nav>

  <!-- Confetti container -->
  <div class="confetti-container" id="confetti-container"></div>

  <main class="puzzle-page">
    <div class="puzzle-header">
      <h1>Anime Picture Puzzle</h1>
      <p>Slide the tiles to reassemble the anime character. Fewer moves = better score.</p>
    </div>

    <!-- Character selector -->
    <div>
      <div class="section-label" style="text-align:center;margin-bottom:12px;">Choose Character</div>
      <div class="char-selector-wrap">

        <!-- Naruto Universe -->
        <div class="char-series-group">
          <div class="char-series-label">Naruto</div>
          <div class="char-selector">
            <button class="char-btn active" data-char="naruto" id="char-naruto" aria-label="Naruto">
              <img src="../img/games/naruto.png" alt="Naruto">
              <span class="char-label">Naruto</span>
            </button>
            <button class="char-btn" data-char="sasuke" id="char-sasuke" aria-label="Sasuke">
              <img src="../img/games/sasuke.png" alt="Sasuke">
              <span class="char-label">Sasuke</span>
            </button>
            <button class="char-btn" data-char="kakashi" id="char-kakashi" aria-label="Kakashi">
              <img src="../img/games/kakashi.png" alt="Kakashi">
              <span class="char-label">Kakashi</span>
            </button>
          </div>
        </div>

        <!-- Bleach -->
        <div class="char-series-group">
          <div class="char-series-label">Bleach</div>
          <div class="char-selector">
            <button class="char-btn" data-char="ichigo" id="char-ichigo" aria-label="Ichigo">
              <img src="../img/games/ichigo.png" alt="Ichigo">
              <span class="char-label">Ichigo</span>
            </button>
            <button class="char-btn" data-char="rukia" id="char-rukia" aria-label="Rukia">
              <img src="../img/games/rukia.png" alt="Rukia">
              <span class="char-label">Rukia</span>
            </button>
            <button class="char-btn" data-char="aizen" id="char-aizen" aria-label="Aizen">
              <img src="../img/games/aizen.png" alt="Aizen">
              <span class="char-label">Aizen</span>
            </button>
          </div>
        </div>

        <!-- Other Series -->
        <div class="char-series-group">
          <div class="char-series-label">Others</div>
          <div class="char-selector">
            <button class="char-btn" data-char="gojo" id="char-gojo" aria-label="Gojo">
              <img src="../img/games/gojo.png" alt="Gojo">
              <span class="char-label">Gojo</span>
            </button>
            <button class="char-btn" data-char="tanjiro" id="char-tanjiro" aria-label="Tanjiro">
              <img src="../img/games/tanjiro.png" alt="Tanjiro">
              <span class="char-label">Tanjiro</span>
            </button>
            <button class="char-btn" data-char="zoro" id="char-zoro" aria-label="Zoro">
              <img src="../img/games/zoro.png" alt="Zoro">
              <span class="char-label">Zoro</span>
            </button>
            <button class="char-btn" data-char="jinwoo" id="char-jinwoo" aria-label="Jinwoo">
              <img src="../img/games/jinwoo.png" alt="Sung Jinwoo">
              <span class="char-label">Jinwoo</span>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Game area -->
    <div class="puzzle-game-area">
      <!-- Board -->
      <div class="puzzle-board-wrapper">
        <div class="puzzle-board" id="puzzle-board" role="grid" aria-label="Puzzle grid">
          <!-- tiles injected by JS -->
          <div class="puzzle-solved-overlay" id="solved-overlay">
            <div style="font-size:52px;">🎉</div>
            <h2>Puzzle Solved!</h2>
            <p id="solved-msg"></p>
            <button class="btn-puzzle btn-puzzle--primary" onclick="startNewGame()" style="width:auto;padding:12px 28px;">Play Again</button>
          </div>
        </div>
      </div>

      <!-- Side panel -->
      <div class="puzzle-side">
        <div>
          <div class="section-label">Reference Image</div>
          <div class="puzzle-reference">
            <img src="../img/games/naruto.png" alt="Reference" id="ref-img">
            <span class="puzzle-reference-label">Target</span>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:8px;">Difficulty</div>
          <div class="diff-selector">
            <button class="diff-btn" data-grid="3" id="diff-3">3×3</button>
            <button class="diff-btn active" data-grid="4" id="diff-4">4×4</button>
            <button class="diff-btn" data-grid="5" id="diff-5">5×5</button>
          </div>
        </div>

        <div class="puzzle-stats">
          <div class="puzzle-stat">
            <span class="puzzle-stat-label">Moves</span>
            <span class="puzzle-stat-value" id="stat-moves">0</span>
          </div>
          <div class="puzzle-stat">
            <span class="puzzle-stat-label">Time</span>
            <span class="puzzle-stat-value" id="stat-time">0:00</span>
          </div>
          <div class="puzzle-stat">
            <span class="puzzle-stat-label">Best</span>
            <span class="puzzle-stat-value" id="stat-best">—</span>
          </div>
        </div>

        <div class="puzzle-controls">
          <button class="btn-puzzle btn-puzzle--primary" onclick="startNewGame()" id="btn-new">New Game</button>
          <button class="btn-puzzle btn-puzzle--ghost" onclick="shuffleBoard()" id="btn-shuffle">Shuffle</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/sounds.js"></script>
  <script>
    /* ─── State ─────────────────────────────────────── */
    let gridSize = 4;
    let tiles = [];         // array of tile values (0 = empty)
    let emptyIndex = 0;
    let moveCount = 0;
    let timerInterval = null;
    let timerSeconds = 0;
    let isLocked = false;   // prevent moves during animation
    let isSolved = false;
    let bestMoves = {};

    const IMAGES = {
      naruto:  '../img/games/naruto.png',
      sasuke:  '../img/games/sasuke.png',
      kakashi: '../img/games/kakashi.png',
      ichigo:  '../img/games/ichigo.png',
      rukia:   '../img/games/rukia.png',
      aizen:   '../img/games/aizen.png',
      gojo:    '../img/games/gojo.png',
      tanjiro: '../img/games/tanjiro.png',
      zoro:    '../img/games/zoro.png',
      jinwoo:  '../img/games/jinwoo.png'
    };
    let currentChar = 'naruto';

    function getTileSize() {
      if (window.innerWidth <= 640) {
        return { 3: 90, 4: 70, 5: 56 }[gridSize];
      }
      return { 3: 130, 4: 110, 5: 88 }[gridSize];
    }

    /* ─── DOM refs ──────────────────────────────────── */
    const board       = document.getElementById('puzzle-board');
    const solvedOvl   = document.getElementById('solved-overlay');
    const solvedMsg   = document.getElementById('solved-msg');
    const statMoves   = document.getElementById('stat-moves');
    const statTime    = document.getElementById('stat-time');
    const statBest    = document.getElementById('stat-best');
    const navMoves    = document.getElementById('nav-moves');
    const refImg      = document.getElementById('ref-img');
    const confettiCtr = document.getElementById('confetti-container');

    /* ─── Init ──────────────────────────────────────── */
    window.addEventListener('DOMContentLoaded', () => {
      // Difficulty buttons
      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          SFX.select();
          document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          gridSize = parseInt(btn.dataset.grid);
          startNewGame();
        });
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          if (tiles.length > 0) renderBoard();
        }, 200);
      });

      // Character buttons
      document.querySelectorAll('.char-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          SFX.select();
          document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentChar = btn.dataset.char;
          refImg.src = IMAGES[currentChar];
          startNewGame();
        });
      });

      startNewGame();
    });

    /* ─── Game Setup ────────────────────────────────── */
    function startNewGame() {
      clearInterval(timerInterval);
      timerSeconds = 0;
      moveCount = 0;
      isSolved = false;
      isLocked = false;
      solvedOvl.classList.remove('visible');
      updateStats();
      createTiles();
      shuffleBoard();
      startTimer();
    }

    function createTiles() {
      const n = gridSize * gridSize;
      tiles = Array.from({ length: n }, (_, i) => i); // 0 = empty (last position)
      emptyIndex = n - 1;
      renderBoard();
    }

    function renderBoard() {
      const tileSize = getTileSize();
      const boardSize = tileSize * gridSize + 3 * (gridSize - 1) + 6;

      board.style.gridTemplateColumns = `repeat(${gridSize}, ${tileSize}px)`;
      board.style.width = boardSize + 'px';
      board.style.height = boardSize + 'px';

      // Remove existing tiles (keep overlay)
      board.querySelectorAll('.puzzle-tile').forEach(t => t.remove());

      const imgSrc = IMAGES[currentChar];
      const totalImg = tileSize * gridSize;

      tiles.forEach((val, idx) => {
        const tile = document.createElement('div');
        tile.className = 'puzzle-tile' + (val === 0 ? ' empty-tile' : '');
        tile.dataset.index = idx;
        tile.dataset.val = val;
        tile.setAttribute('role', 'gridcell');
        tile.setAttribute('tabindex', val === 0 ? '-1' : '0');
        tile.setAttribute('aria-label', val === 0 ? 'Empty tile' : `Tile ${val}`);

        if (val !== 0) {
          // Calculate background position for this tile
          const correctIdx = val - 1;
          const col = correctIdx % gridSize;
          const row = Math.floor(correctIdx / gridSize);
          tile.style.backgroundImage = `url('${imgSrc}')`;
          tile.style.backgroundSize = `${totalImg}px ${totalImg}px`;
          tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
          tile.style.width = tileSize + 'px';
          tile.style.height = tileSize + 'px';

          tile.addEventListener('click', () => handleTileClick(parseInt(tile.dataset.index)));
          tile.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') handleTileClick(parseInt(tile.dataset.index));
          });

          // Highlight movable tiles
          if (isMovable(idx)) tile.classList.add('movable');
        } else {
          tile.style.width = tileSize + 'px';
          tile.style.height = tileSize + 'px';
        }

        board.insertBefore(tile, solvedOvl);
      });
    }

    function isMovable(idx) {
      const empty = tiles.indexOf(0);
      const row = Math.floor(idx / gridSize);
      const eRow = Math.floor(empty / gridSize);
      const col = idx % gridSize;
      const eCol = empty % gridSize;
      return (row === eRow && Math.abs(col - eCol) === 1) ||
             (col === eCol && Math.abs(row - eRow) === 1);
    }

    function handleTileClick(idx) {
      if (isLocked || isSolved) return;
      if (!isMovable(idx)) return;

      SFX.slide();
      const empty = tiles.indexOf(0);
      // Swap
      [tiles[idx], tiles[empty]] = [tiles[empty], tiles[idx]];
      moveCount++;
      updateStats();
      renderBoard();

      if (checkSolved()) {
        setTimeout(showSolved, 180);
      }
    }

    /* ─── Shuffle ───────────────────────────────────── */
    function shuffleBoard() {
      const n = gridSize * gridSize;
      const shuffles = n * 30;
      for (let i = 0; i < shuffles; i++) {
        const empty = tiles.indexOf(0);
        const neighbors = getNeighbors(empty);
        const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
        [tiles[empty], tiles[pick]] = [tiles[pick], tiles[empty]];
      }
      moveCount = 0;
      updateStats();
      renderBoard();
    }

    function getNeighbors(idx) {
      const row = Math.floor(idx / gridSize);
      const col = idx % gridSize;
      const n = [];
      if (row > 0) n.push(idx - gridSize);
      if (row < gridSize - 1) n.push(idx + gridSize);
      if (col > 0) n.push(idx - 1);
      if (col < gridSize - 1) n.push(idx + 1);
      return n;
    }

    /* ─── Check Solved ──────────────────────────────── */
    function checkSolved() {
      return tiles.every((val, idx) => {
        if (idx === tiles.length - 1) return val === 0;
        return val === idx + 1;
      });
    }

    function showSolved() {
      isSolved = true;
      clearInterval(timerInterval);
      SFX.win();

      const key = `${currentChar}-${gridSize}`;
      if (!bestMoves[key] || moveCount < bestMoves[key]) {
        bestMoves[key] = moveCount;
        localStorage.setItem('puzzleBest_' + key, moveCount);
      }
      updateBestDisplay();

      solvedMsg.textContent = `Solved in ${moveCount} moves and ${formatTime(timerSeconds)}! 🎉`;
      solvedOvl.classList.add('visible');
      launchConfetti();
    }

    /* ─── Timer ─────────────────────────────────────── */
    function startTimer() {
      timerInterval = setInterval(() => {
        timerSeconds++;
        statTime.textContent = formatTime(timerSeconds);
      }, 1000);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function updateStats() {
      statMoves.textContent = moveCount;
      navMoves.textContent = moveCount;
      updateBestDisplay();
    }

    function updateBestDisplay() {
      const key = `${currentChar}-${gridSize}`;
      const stored = localStorage.getItem('puzzleBest_' + key);
      if (stored) {
        statBest.textContent = stored + ' moves';
        bestMoves[key] = parseInt(stored);
      } else {
        statBest.textContent = '—';
      }
    }

    /* ─── Confetti ──────────────────────────────────── */
    function launchConfetti() {
      const colors = ['#a78bfa', '#60a5fa', '#34d399', '#f472b6', '#fb923c', '#facc15'];
      confettiCtr.innerHTML = '';
      for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -10px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${1.5 + Math.random() * 2}s;
          animation-delay: ${Math.random() * 0.8}s;
          transform: rotate(${Math.random() * 360}deg);
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        `;
        confettiCtr.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }
  </script>

</body>
